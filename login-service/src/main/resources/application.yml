# Spring Boot 配置
server:
  port: 8081
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/jwt_demo?useSSL=false&serverTimezone=UTC
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  security:
    user:
      name: false
# JWT 配置
jwt:
  secret: your-secret-key-123456  # 密钥（生产环境需复杂且保密）
  expiration: 86400000  # 令牌过期时间（毫秒，例如 24小时=86400000）
  tokenHeader: Authorization  # 请求头中的令牌字段名
  tokenPrefix: Bearer  # 令牌前缀（与请求头值拼接，如 "Bearer token"）
# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.entity
  configuration:
    map-underscore-to-camel-case: true

